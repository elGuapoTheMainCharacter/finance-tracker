<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Money Trekker - Advanced</title>
</head>
<body>
    <h1 class="heading">Money Trekker</h1>

    <div class="balance" id="balance">
        <div class="currentBalance">
            <h2>Balance: R</h2>
            <h2 id="editCurrentBalance">0.00</h2>
        </div>
        <div class="income">
            <div class="currentSalary">
                <h2>Current Salary: R</h2>
                <h2 id="editCurrentSalary" contenteditable="false">0</h2>
            </div>
            <div class="expenses">
                <h2>Expenses: R</h2>
                <h2 id="expensesValue">0.00</h2>
            </div>
        </div>
        <button class="editSalaryBtn" id="editSalaryBtn">Edit Salary</button>
    </div>

    <div class="userInput">
        <div>
            <label for="itemName">Item Name:</label>
            <input id="itemName" type="text" placeholder="Item name">
        </div>
        <div>
            <label for="itemPrice">Price:</label>
            <input id="itemPrice" type="number" placeholder="0.00">
        </div>
        <div>
            <label for="category">Category:</label>
            <select id="category">
                <option value="grocery">Grocery</option>
                <option value="transport">Transport</option>
                <option value="rent">Rent</option>
                <option value="clothes">Clothes</option>
                <option value="college">College</option>
            </select>
        </div>
        <div>
            <label for="buyDate">Date:</label>
            <input id="buyDate" type="date">
        </div>
        <div>
            <label for="budgetGoal">Limit: R</label>
            <input id="budgetGoal" type="number" placeholder="Budget Goal">
        </div>
        <button id="addBtn">Add</button>
    </div>

    <div class="table-controls">
        <input type="text" id="searchInput" placeholder="Search expenses...">
        <button id="exportBtn" class="editSalaryBtn">Download CSV</button>
    </div>

    <div class="table">
        <table id="expenseTable">
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Price</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td id="totalAmount">R0.00</td>
                    <td colspan="3"></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="yourBehavior">
        <!-- Dashboard Analysis injects here -->
    </div>

    <footer>
        &copy; elGuapo 2025 | Financial Tracking System
    </footer>

    <script src="script.js"></script>
</body>
</html>
